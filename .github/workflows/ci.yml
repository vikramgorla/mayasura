name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  check:
    name: TypeScript & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          JWT_SECRET: ci-test-secret
          DATABASE_PATH: ./data/ci-test.db

