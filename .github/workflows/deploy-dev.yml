name: Deploy to Dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  ci:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          JWT_SECRET: ci-test-secret
          DATABASE_PATH: ./data/ci-test.db

  deploy:
    name: Deploy to Railway (dev)
    runs-on: ubuntu-latest
    needs: ci
    environment: dev
    steps:
      - name: Trigger Railway deploy
        run: |
          curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{"query": "mutation { serviceInstanceRedeploy(serviceId: \"6ee14f05-ce67-4619-9720-f4022d7a84c8\", environmentId: \"06b6f83d-fb99-4fe1-b27d-b6b751b76ecc\") }"}' \
            | jq -e '.data.serviceInstanceRedeploy == true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
