name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Run unit tests
        run: npm run test

      - name: Deploy to Railway
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Railway auto-deploys from main branch."
          echo "This step is a placeholder for manual deployment triggers."
          echo "Configure Railway webhook or use Railway CLI for manual deploys."
        # Note: Railway auto-deploys from main branch via GitHub integration.
        # For manual deployment, configure the Railway CLI or GitHub Action:
        # uses: bervProject/railway-deploy@main
        # with:
        #   railway_token: ${{ secrets.RAILWAY_TOKEN }}
        #   service: mayasura-web
