name: Preview Environment

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          JWT_SECRET: ci-test-secret
          DATABASE_PATH: ./data/ci-test.db

  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Create or update preview environment
        id: preview
        run: |
          ENV_NAME="pr-${{ github.event.pull_request.number }}"

          # Try to create environment, ignore if exists
          railway environment create "$ENV_NAME" 2>/dev/null || true

          # Deploy to the preview environment
          railway up --service mayasura-web --environment "$ENV_NAME" --detach

          echo "environment=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "url=https://mayasura-web-${ENV_NAME}.up.railway.app" >> "$GITHUB_OUTPUT"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const envName = '${{ steps.preview.outputs.environment }}';
            const url = '${{ steps.preview.outputs.url }}';
            const body = `🏛️ **Preview deployed!**\n\n🔗 ${url}\n\nEnvironment: \`${envName}\`\nCommit: \`${context.sha.substring(0, 7)}\``;

            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body?.includes('Preview deployed'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
